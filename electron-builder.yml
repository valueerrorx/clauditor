appId: dev.clauditor.app
productName: clauditor
copyright: Copyright © 2026 clauditor

directories:
  buildResources: build
  output: dist

# electron-vite emits the compiled app into out/
files:
  - out/**
  - package.json

# keep native whisper.cpp binary + downloaded models outside the asar archive
asarUnpack:
  - node_modules/nodejs-whisper/**

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: clauditor
  icon: build/icon.png
  executableName: clauditor
  # link running windows to the .desktop entry (WM_CLASS)
  synopsis: Records, transcribes offline and summarizes audio into markdown
  desktop:
    entry:
      StartupWMClass: clauditor

win:
  target:
    - portable
    - msi
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch: arm64
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # notarizes via APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID env vars
  notarize: true

# release publishing is handled by the GitHub Actions workflow, not electron-builder
publish: null
